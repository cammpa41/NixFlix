<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NixFlix — Cinematic Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF0033;
      --bg-dark: #0A0A0A;
      --text-primary: #FFFFFF;
      --accent-blue: #3B82F6;
      --gradient-primary: linear-gradient(135deg, #FF0033 0%, #CC0066 100%);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      padding: 25px 60px;
      position: fixed; top: 0; width: 100%; z-index: 10000;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(10,10,10,1) 40%, transparent);
    }
    
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px; letter-spacing: 4px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      user-select: none;
    }

    .search-input {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      padding: 12px 25px; border-radius: 50px; color: white; width: 300px;
      backdrop-filter: blur(20px); outline: none; transition: 0.3s;
    }

    #heroSection { position: relative; height: 85vh; width: 100%; overflow: hidden; z-index: 10; }
    .hero-slide {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover; background-position: center 15%;
      opacity: 0; transition: opacity 1s ease-in-out;
      display: flex; align-items: center; padding: 0 60px;
    }
    .hero-slide.active { opacity: 1; z-index: 5; }
    .hero-slide::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to right, rgba(10,10,10,0.9) 10%, transparent 70%),
                  linear-gradient(to top, rgba(10,10,10,1) 0%, transparent 30%);
    }
    .hero-content { position: relative; z-index: 100; max-width: 700px; margin-top: 60px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 100px; line-height: 0.85; margin-bottom: 25px; user-select: none; }
    .hero-btns { display: flex; gap: 15px; }
    
    .btn { 
        padding: 16px 35px; border-radius: 8px; font-weight: 700; 
        cursor: pointer; border: none; transition: 0.3s; 
    }
    .btn-watch { background: var(--accent-blue); color: white; }
    .btn-info { background: rgba(255,255,255,0.1); color: white; backdrop-filter: blur(10px); }

    .genre-nav { padding: 30px 60px; position: relative; z-index: 100; background: var(--bg-dark); }
    .genre-list { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; }
    .genre-item {
      padding: 10px 25px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
      color: #B8B8B8; cursor: pointer; white-space: nowrap; transition: 0.3s;
      user-select: none;
    }
    .genre-item.active { background: var(--primary); color: white; border-color: var(--primary); }

    .section-title { padding: 60px 60px 25px; font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; display: flex; align-items: center; gap: 15px; user-select: none; }
    .section-title::before { content: ''; width: 4px; height: 35px; background: var(--gradient-primary); border-radius: 10px; }

    .carousel { 
      display: flex; 
      overflow-x: auto; 
      padding: 20px 60px 40px; 
      gap: 20px; 
      scrollbar-width: none; 
      cursor: grab;
      user-select: none; 
      -webkit-user-select: none;
    }
    .carousel:active { cursor: grabbing; }

    .movie-card { 
      width: 220px; 
      flex-shrink: 0; 
      transition: 0.5s; 
      cursor: pointer; 
    }
    .movie-card img { 
      width: 100%; height: 320px; object-fit: cover; border-radius: 12px; 
      pointer-events: none;
      -webkit-user-drag: none;
    }
    .movie-card:hover { transform: scale(1.08) translateY(-10px); }

    .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); padding: 120px 60px; gap: 25px; }
    .hidden { display: none !important; }

    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      header {
        padding: 20px 20px;
        flex-direction: column;
        gap: 15px;
      }

      .logo {
        font-size: 36px;
        letter-spacing: 2px;
      }

      .search-input {
        width: 100%;
        padding: 10px 20px;
      }

      #heroSection {
        height: 60vh;
      }

      .hero-slide {
        padding: 0 20px;
      }

      .hero-content {
        margin-top: 40px;
      }

      .hero-title {
        font-size: 50px;
      }

      .hero-btns {
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      .genre-nav {
        padding: 20px 20px;
      }

      .genre-list {
        gap: 8px;
      }

      .genre-item {
        padding: 8px 16px;
        font-size: 14px;
      }

      .section-title {
        padding: 40px 20px 15px;
        font-size: 28px;
      }

      .section-title::before {
        height: 25px;
      }

      .carousel {
        padding: 15px 20px 30px;
        gap: 15px;
      }

      .movie-card {
        width: 160px;
      }

      .movie-card img {
        height: 240px;
      }

      .search-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        padding: 100px 20px;
        gap: 15px;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 30px;
      }

      .hero-title {
        font-size: 40px;
      }

      .section-title {
        font-size: 24px;
      }

      .movie-card {
        width: 140px;
      }

      .movie-card img {
        height: 210px;
      }

      .genre-item {
        padding: 6px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="resetToHome()">NIXFLIX</div>
  <input type="text" id="searchInput" class="search-input" placeholder="Search movies or shows..." />
</header>

<section id="heroSection">
    <div id="hero"></div>
</section>

<nav class="genre-nav" id="genreNavSection">
  <div class="genre-list">
    <div class="genre-item active" data-id="all">All Trends</div>
    <div class="genre-item" data-id="28">Action</div>
    <div class="genre-item" data-id="27">Horror</div>
    <div class="genre-item" data-id="35">Comedy</div>
    <div class="genre-item" data-id="878">Sci-Fi</div>
  </div>
</nav>

<div id="contentContainer">
  <div id="shelfView">
    <div id="myListSection" class="hidden">
        <h2 class="section-title">My List</h2>
        <section id="myListShelf" class="carousel"></section>
    </div>

    <div id="defaultShelves">
        <h2 class="section-title">Trending Now</h2>
        <section id="trendingShelf" class="carousel"></section>
        <h2 class="section-title">Popular Choice</h2>
        <section id="popularShelf" class="carousel"></section>
    </div>
    <div id="genreSingleShelf" class="hidden">
        <h2 class="section-title" id="genreTitle">Selection</h2>
        <section id="genreShelf" class="carousel"></section>
    </div>
  </div>
  <div id="searchView" class="hidden">
    <h2 class="section-title" id="searchTitle">Search Results</h2>
    <section id="searchGrid" class="search-grid"></section>
  </div>
</div>

<script>
const apiKey = '93843c8c295f5655a75d6361487e911a';
const imgBase = 'https://image.tmdb.org/t/p/original';

function makeDraggable(el) {
    let isDown = false, startX, scrollLeft;
    el.onmousedown = (e) => { 
        isDown = true; 
        startX = e.pageX - el.offsetLeft; 
        scrollLeft = el.scrollLeft;
        el.style.scrollBehavior = 'auto';
    };
    el.onmouseleave = () => isDown = false;
    el.onmouseup = () => { isDown = false; el.style.scrollBehavior = 'smooth'; };
    el.onmousemove = (e) => { 
        if(!isDown) return; 
        e.preventDefault();
        const x = e.pageX - el.offsetLeft; 
        const walk = (x - startX) * 2; 
        el.scrollLeft = scrollLeft - walk; 
    };
}

function goToDetails(item) {
    const isTV = item.media_type === 'tv' || item.first_air_date !== undefined;
    window.location.href = isTV 
        ? `show.html?id=${item.id}&name=${encodeURIComponent(item.name || item.original_name)}`
        : `movie.html?id=${item.id}`;
}

function resetToHome() { window.location.reload(); }

// NEW: Render My List
function renderMyList() {
    const myList = JSON.parse(localStorage.getItem('nixflix_watchlist')) || [];
    const section = document.getElementById('myListSection');
    const shelf = document.getElementById('myListShelf');

    if (myList.length === 0) {
        section.classList.add('hidden');
        return;
    }

    section.classList.remove('hidden');
    shelf.innerHTML = '';
    myList.forEach(item => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${item.poster_path}" />`;
        card.onclick = () => goToDetails(item);
        shelf.appendChild(card);
    });
    makeDraggable(shelf);
}

document.getElementById('searchInput').oninput = (e) => {
    const q = e.target.value.trim();
    if (q.length > 0) {
        document.getElementById('heroSection').classList.add('hidden');
        document.getElementById('genreNavSection').classList.add('hidden');
        document.getElementById('shelfView').classList.add('hidden');
        document.getElementById('searchView').classList.remove('hidden');
        fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${q}`)
            .then(r => r.json()).then(data => {
                const grid = document.getElementById('searchGrid');
                grid.innerHTML = '';
                data.results.forEach(m => {
                    if(!m.poster_path) return;
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}" />`;
                    card.onclick = () => goToDetails(m);
                    grid.appendChild(card);
                });
            });
    } else {
        document.getElementById('heroSection').classList.remove('hidden');
        document.getElementById('genreNavSection').classList.remove('hidden');
        document.getElementById('shelfView').classList.remove('hidden');
        document.getElementById('searchView').classList.add('hidden');
    }
};

document.querySelectorAll('.genre-item').forEach(item => {
    item.onclick = () => {
        const gid = item.dataset.id;
        document.querySelectorAll('.genre-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        if (gid === 'all') { resetToHome(); } 
        else {
            document.getElementById('myListSection').classList.add('hidden');
            document.getElementById('defaultShelves').classList.add('hidden');
            document.getElementById('genreSingleShelf').classList.remove('hidden');
            document.getElementById('genreTitle').innerText = item.innerText;
            renderShelf(`https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&with_genres=${gid}`, 'genreShelf');
        }
    };
});

async function setupHero() {
  const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${apiKey}`);
  const data = await res.json();
  const heroContainer = document.getElementById('hero');
  data.results.slice(0, 5).forEach((item, index) => {
    const slide = document.createElement('div');
    slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
    slide.style.backgroundImage = `url(${imgBase + item.backdrop_path})`;
    slide.innerHTML = `<div class="hero-content"><h1 class="hero-title">${item.title || item.name}</h1><div class="hero-btns"><button class="btn btn-watch" onclick='goToDetails(${JSON.stringify(item)})'>▶ Watch Now</button><button class="btn btn-info">ⓘ Info</button></div></div>`;
    heroContainer.appendChild(slide);
  });
  let current = 0;
  setInterval(() => {
    const slides = document.querySelectorAll('.hero-slide');
    if (slides.length) { current = (current + 1) % slides.length; slides.forEach((s, i) => s.classList.toggle('active', i === current)); }
  }, 5000);
}

function renderShelf(url, id) {
  fetch(url).then(r => r.json()).then(data => {
    const shelf = document.getElementById(id);
    shelf.innerHTML = '';
    data.results.forEach(m => {
        if(!m.poster_path) return;
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}" />`;
        card.onclick = () => goToDetails(m);
        shelf.appendChild(card);
    });
    makeDraggable(shelf);
  });
}

setupHero();
renderMyList();
renderShelf(`https://api.themoviedb.org/3/trending/all/week?api_key=${apiKey}`, 'trendingShelf');
renderShelf(`https://api.themoviedb.org/3/movie/popular?api_key=${apiKey}`, 'popularShelf');
</script>
</body>
</html>
