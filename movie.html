<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NixFlix — Watch Movie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF0033;
      --bg-dark: #0A0A0A;
      --bg-elevated: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #B8B8B8;
      --accent-gold: #FFD700;
      --gradient-primary: linear-gradient(135deg, #FF0033 0%, #CC0066 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-dark); color: var(--text-primary); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 50%, rgba(255, 0, 51, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(204, 0, 102, 0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    header { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 25px 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; animation: slideDown 0.6s ease-out; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 4px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; cursor: pointer; transition: all 0.3s ease; }
    .nav-btns { display: flex; gap: 15px; }
    .btn { padding: 12px 30px; font-size: 15px; font-weight: 500; border-radius: 30px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1); color: white; background: rgba(255, 255, 255, 0.05); }
    .btn-primary { background: var(--gradient-primary); border: none; }
    .video-container { position: relative; padding: 40px 60px; animation: fadeIn 0.8s ease-out 0.2s backwards; }
    #movieIframe { width: 100%; height: 80vh; background: #000; border: none; border-radius: 16px; box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5); }
    .recommendations { padding: 60px 60px 80px; }
    .recommendations h2 { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; margin-bottom: 40px; position: relative; }
    .rec-list { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; cursor: grab; }
    .rec-item { flex: 0 0 auto; width: 200px; cursor: pointer; transition: 0.5s; }
    .rec-item img { width: 100%; border-radius: 12px; height: 300px; object-fit: cover; pointer-events: none; }
    .rec-item:hover { transform: scale(1.08) translateY(-10px); }
  </style>
</head>
<body>
  <header>
    <h1 onclick="goBack()">NIXFLIX</h1>
    <div class="nav-btns">
        <button id="watchlistBtn" class="btn" onclick="toggleWatchlist()">+ Add to My List</button>
        <button class="btn btn-primary" onclick="goBack()">← Back to Home</button>
    </div>
  </header>
  <div class="video-container">
    <iframe id="movieIframe" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
  <div class="recommendations">
    <h2>You Might Also Like</h2>
    <div class="rec-list" id="recList"></div>
  </div>

<script>
  const movieId = new URLSearchParams(window.location.search).get('id');
  const apiKey = '93843c8c295f5655a75d6361487e911a';
  let currentMovieData = null;

  document.getElementById('movieIframe').src = `https://vidfast.pro/movie/${movieId}`;

  function goBack() { window.location.href = 'index.html'; }

  function makeDraggable(el) {
    let isDown = false, startX, scrollLeft;
    el.onmousedown = (e) => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; el.style.scrollBehavior = 'auto'; };
    el.onmouseleave = () => isDown = false;
    el.onmouseup = () => { isDown = false; el.style.scrollBehavior = 'smooth'; };
    el.onmousemove = (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - el.offsetLeft; const walk = (x - startX) * 2; el.scrollLeft = scrollLeft - walk; };
  }

  fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
        currentMovieData = data;
        updateWatchlistBtnUI();
    });

  fetch(`https://api.themoviedb.org/3/movie/${movieId}/recommendations?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
      const recList = document.getElementById('recList');
      data.results.slice(0, 10).forEach(movie => {
        if(!movie.poster_path) return;
        const div = document.createElement('div');
        div.className = 'rec-item';
        div.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">`;
        div.onclick = () => { window.location.href = `movie.html?id=${movie.id}`; };
        recList.appendChild(div);
      });
      makeDraggable(recList);
    });

  function toggleWatchlist() {
    let list = JSON.parse(localStorage.getItem('nixflix_watchlist')) || [];
    const index = list.findIndex(item => item.id == currentMovieData.id);
    if (index > -1) { list.splice(index, 1); } 
    else {
        list.push({
            id: currentMovieData.id,
            poster_path: currentMovieData.poster_path,
            title: currentMovieData.title,
            media_type: 'movie'
        });
    }
    localStorage.setItem('nixflix_watchlist', JSON.stringify(list));
    updateWatchlistBtnUI();
  }

  function updateWatchlistBtnUI() {
    const list = JSON.parse(localStorage.getItem('nixflix_watchlist')) || [];
    const btn = document.getElementById('watchlistBtn');
    const isAdded = list.some(item => item.id == currentMovieData.id);
    btn.innerHTML = isAdded ? '✓ In My List' : '+ Add to My List';
    btn.style.background = isAdded ? 'var(--primary)' : 'rgba(255,255,255,0.05)';
  }
</script>
</body>
</html>
