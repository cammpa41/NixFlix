<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Series — NixFlix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF0033;
      --bg-dark: #0A0A0A;
      --bg-elevated: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #B8B8B8;
      --accent-gold: #FFD700;
      --gradient-primary: linear-gradient(135deg, #FF0033 0%, #CC0066 100%);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255, 0, 51, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(204, 0, 102, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: slideDown 0.6s ease-out;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-100%);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 4px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    header h1:hover {
      letter-spacing: 7px;
      filter: drop-shadow(0 0 20px rgba(255, 0, 51, 0.5));
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 400px;
    }
    
    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 16px;
      pointer-events: none;
    }

    #searchBar {
      width: 100%;
      padding: 12px 20px 12px 50px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: var(--text-primary);
      transition: all 0.3s ease;
    }
    
    #searchBar::placeholder {
      color: var(--text-secondary);
    }
    
    #searchBar:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255, 0, 51, 0.1);
    }

    #searchResults {
      position: absolute;
      top: 80px;
      right: 60px;
      width: 400px;
      background: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      overflow: hidden;
      z-index: 1000;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-height: 500px;
      overflow-y: auto;
    }

    .search-result {
      display: flex;
      align-items: center;
      padding: 15px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }
    
    .search-result:hover {
      background: rgba(255, 0, 51, 0.1);
    }

    .search-result img {
      width: 50px;
      height: 75px;
      object-fit: cover;
      border-radius: 6px;
      margin-right: 15px;
    }
    
    .search-result div {
      font-size: 14px;
      font-weight: 500;
    }

    .content {
      padding: 40px 60px 80px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .video-container {
      position: relative;
      margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out 0.2s backwards;
    }

    #videoPlayer {
      width: 100%;
      height: 80vh;
      background: #000;
      border: none;
      border-radius: 16px;
      box-shadow: 
        0 30px 90px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: all 0.5s ease;
    }
    
    #videoPlayer:hover {
      box-shadow: 
        0 40px 120px rgba(255, 0, 51, 0.2),
        0 0 0 2px rgba(255, 0, 51, 0.3);
    }

    #nextButton {
      margin-top: 20px;
      padding: 14px 36px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      background: var(--gradient-primary);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(255, 0, 51, 0.3);
    }
    
    #nextButton:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(255, 0, 51, 0.4);
    }
    
    #nextButton:active {
      transform: translateY(0);
    }

    .controls {
      margin: 40px 0;
      animation: fadeIn 1s ease-out 0.4s backwards;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }

    select {
      padding: 14px 24px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 200px;
    }
    
    select:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
    }
    
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255, 0, 51, 0.1);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 900;
      margin: 50px 0 30px;
      position: relative;
      display: inline-block;
      animation: fadeIn 1s ease-out 0.6s backwards;
    }
    
    .section-title::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 70px;
      height: 4px;
      background: var(--gradient-primary);
      border-radius: 2px;
    }

    .episode-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      margin-top: 20px;
      animation: fadeIn 1s ease-out 0.8s backwards;
    }

    .episode-item {
      background: var(--bg-elevated);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    
    .episode-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--gradient-primary);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    .episode-item:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 20px 60px rgba(255, 0, 51, 0.2);
    }
    
    .episode-item:hover::after {
      opacity: 0.1;
    }

    .episode-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    
    .episode-item:hover img {
      transform: scale(1.05);
    }

    .episode-info {
      padding: 20px;
    }

    .episode-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .episode-info p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .recommendations {
      margin-top: 60px;
      animation: fadeIn 1s ease-out 1s backwards;
    }

    .recommendations h2 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 900;
      margin-bottom: 40px;
      position: relative;
      display: inline-block;
    }
    
    .recommendations h2::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 80px;
      height: 4px;
      background: var(--gradient-primary);
      border-radius: 2px;
    }

    .rec-list {
      display: flex;
      overflow-x: auto;
      gap: 24px;
      padding-bottom: 20px;
      scrollbar-width: none;
    }
    
    .rec-list::-webkit-scrollbar {
      display: none;
    }

    .rec-item {
      flex: 0 0 auto;
      width: 200px;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .rec-item img {
      width: 100%;
      border-radius: 12px;
      height: 300px;
      object-fit: cover;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      transition: all 0.5s ease;
    }

    .rec-item:hover {
      transform: scale(1.08) translateY(-10px);
    }
    
    .rec-item:hover img {
      box-shadow: 0 25px 70px rgba(255, 0, 51, 0.3), 0 0 0 2px rgba(255, 0, 51, 0.3);
    }

    .rec-title {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Playfair Display', serif;
      text-align: center;
      line-height: 1.4;
    }
    
    @media (max-width: 768px) {
      header {
        padding: 20px 30px;
      }
      
      header h1 {
        font-size: 32px;
      }
      
      .search-wrapper {
        max-width: 100%;
      }
      
      #searchResults {
        right: 30px;
        left: 30px;
        width: auto;
      }
      
      .content {
        padding: 30px 30px 60px;
      }
      
      h1 {
        font-size: 36px;
      }
      
      #videoPlayer {
        height: 60vh;
      }
      
      .episode-list {
        grid-template-columns: 1fr;
      }
      
      .recommendations h2 {
        font-size: 28px;
      }
      
      .rec-item {
        width: 160px;
      }
      
      .rec-item img {
        height: 240px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1 onclick="goHome()">NIXFLIX</h1>
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchBar" placeholder="Search series..." onkeyup="handleSearch(event)">
  </div>
</header>

<div id="searchResults"></div>

<div class="content">
  <h1 id="showTitle">Loading...</h1>

  <div class="video-container">
    <iframe id="videoPlayer" frameborder="0"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen webkitallowfullscreen mozallowfullscreen referrerpolicy="no-referrer"></iframe>
    
    <button id="nextButton" style="display: none;">Next Episode →</button>
  </div>

  <div class="controls">
    <label for="seasonSelect">Choose a Season</label>
    <select id="seasonSelect" onchange="loadEpisodes()"></select>
  </div>

  <h3 class="section-title">Episodes</h3>
  <div class="episode-list" id="episodeList"></div>

  <div class="recommendations">
    <h2>More Like This</h2>
    <div class="rec-list" id="recList"></div>
  </div>
</div>

<script>
const apiKey = '93843c8c295f5655a75d6361487e911a';
const urlParams = new URLSearchParams(window.location.search);
const showId = urlParams.get('id');
const showName = urlParams.get('name');
let selectedSeason = 1;
let currentEpisodeIndex = -1;
let currentEpisodeList = [];

document.getElementById('showTitle').textContent = decodeURIComponent(showName || 'Series');

function goHome() {
  window.location.href = 'index.html';
}

function handleSearch(event) {
  const query = event.target.value.trim();
  const resultsDiv = document.getElementById('searchResults');
  resultsDiv.innerHTML = '';
  if (query.length < 2) return;

  fetch(`https://api.themoviedb.org/3/search/tv?api_key=${apiKey}&query=${encodeURIComponent(query)}`)
    .then(res => res.json())
    .then(data => {
      data.results.slice(0, 6).forEach(show => {
        const div = document.createElement('div');
        div.className = 'search-result';
        const img = show.poster_path ? `https://image.tmdb.org/t/p/w200${show.poster_path}` : 'https://via.placeholder.com/80x120?text=No+Image';
        div.innerHTML = `<img src="${img}" alt=""><div>${show.name}</div>`;
        div.onclick = () => {
          window.location.href = `show.html?id=${show.id}&name=${encodeURIComponent(show.name)}`;
        };
        resultsDiv.appendChild(div);
      });
    });
}

function loadSeasons() {
  fetch(`https://api.themoviedb.org/3/tv/${showId}?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
      const seasonSelect = document.getElementById('seasonSelect');
      seasonSelect.innerHTML = '';
      data.seasons.forEach(season => {
        if (season.season_number === 0) return;
        const option = document.createElement('option');
        option.value = season.season_number;
        option.textContent = `Season ${season.season_number}`;
        seasonSelect.appendChild(option);
      });
      selectedSeason = seasonSelect.value;
      loadEpisodes();
      loadRecommendations();
    });
}

function loadEpisodes() {
  const season = document.getElementById('seasonSelect').value;
  fetch(`https://api.themoviedb.org/3/tv/${showId}/season/${season}?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
      currentEpisodeList = data.episodes;
      const episodeList = document.getElementById('episodeList');
      episodeList.innerHTML = '';
      data.episodes.forEach((episode, index) => {
        const still = episode.still_path
          ? `https://image.tmdb.org/t/p/w500${episode.still_path}`
          : 'https://via.placeholder.com/500x281?text=No+Image';

        const div = document.createElement('div');
        div.className = 'episode-item';
        div.innerHTML = `
          <img src="${still}" alt="Episode ${episode.episode_number}">
          <div class="episode-info">
            <h3>Episode ${episode.episode_number}: ${episode.name}</h3>
            <p>${episode.overview || 'No description available.'}</p>
          </div>
        `;
        div.onclick = () => {
          currentEpisodeIndex = index;
          playEpisode(episode.episode_number, season);
        };
        episodeList.appendChild(div);
      });
    });
}

function playEpisode(episodeNumber, season) {
  const iframe = document.getElementById('videoPlayer');
  iframe.src = `https://vidfast.pro/tv/${showId}/${season}/${episodeNumber}`;
  iframe.scrollIntoView({ behavior: 'smooth' });
  document.getElementById('nextButton').style.display = 'inline-block';
}

document.getElementById('nextButton').onclick = () => {
  const nextIndex = currentEpisodeIndex + 1;
  if (currentEpisodeList[nextIndex]) {
    currentEpisodeIndex = nextIndex;
    playEpisode(currentEpisodeList[nextIndex].episode_number, document.getElementById('seasonSelect').value);
  } else {
    alert("No more episodes in this season.");
  }
};

function loadRecommendations() {
  fetch(`https://api.themoviedb.org/3/tv/${showId}/recommendations?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
      const recList = document.getElementById('recList');
      recList.innerHTML = '';
      data.results.forEach(rec => {
        const poster = rec.poster_path
          ? `https://image.tmdb.org/t/p/w500${rec.poster_path}`
          : 'https://via.placeholder.com/200x300?text=No+Image';

        const div = document.createElement('div');
        div.className = 'rec-item';
        div.innerHTML = `
          <img src="${poster}" alt="${rec.name}">
          <div class="rec-title">${rec.name}</div>
        `;
        div.onclick = () => {
          window.location.href = `show.html?id=${rec.id}&name=${encodeURIComponent(rec.name)}`;
        };
        recList.appendChild(div);
      });
    });
}

loadSeasons();
</script>

</body>
</html>
