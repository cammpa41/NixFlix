<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Series — NixFlix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF0033;
      --bg-dark: #0A0A0A;
      --bg-elevated: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #B8B8B8;
      --accent-gold: #FFD700;
      --gradient-primary: linear-gradient(135deg, #FF0033 0%, #CC0066 100%);
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255, 0, 51, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(204, 0, 102, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: slideDown 0.6s ease-out;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: 1; transform: translateY(0); }
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 4px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    header h1:hover {
      letter-spacing: 7px;
      filter: drop-shadow(0 0 20px rgba(255, 0, 51, 0.5));
    }

    .header-right { display: flex; align-items: center; gap: 20px; flex: 1; justify-content: flex-end; }

    .search-wrapper { position: relative; width: 100%; max-width: 400px; }
    #searchBar {
      width: 100%; padding: 12px 20px 12px 50px; font-size: 15px;
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px; color: var(--text-primary); outline: none;
    }

    #searchResults {
      position: absolute; top: 80px; right: 60px; width: 400px;
      background: rgba(26, 26, 26, 0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
      z-index: 1000; max-height: 500px; overflow-y: auto;
    }

    .search-result { display: flex; align-items: center; padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .search-result img { width: 50px; height: 75px; object-fit: cover; border-radius: 6px; margin-right: 15px; }

    .content { padding: 40px 60px 80px; position: relative; z-index: 2; }

    h1#showTitle {
      font-family: 'Playfair Display', serif;
      font-size: 48px; font-weight: 900; margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #videoPlayer {
      width: 100%; height: 80vh; background: #000; border: none;
      border-radius: 16px; box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
    }

    .player-controls {
      display: flex; align-items: center; justify-content: center;
      gap: 15px; margin-top: 20px;
    }

    .control-btn {
      padding: 12px 24px; border-radius: 30px; cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05);
      color: white; font-weight: 600; transition: 0.3s;
    }
    .btn-primary { background: var(--gradient-primary); border: none; }

    .controls { margin: 40px 0; }
    label { display: block; font-size: 16px; margin-bottom: 12px; color: var(--text-secondary); }

    select {
      padding: 14px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: #B8B8B8;
      cursor: pointer;
      min-width: 200px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 20px center;
      background-size: 15px;
    }

    select option { background-color: #1A1A1A; color: #B8B8B8; }

    .section-title { 
      padding: 20px 0; font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; 
      display: flex; align-items: center; gap: 15px;
    }
    .section-title::before { content: ''; width: 4px; height: 28px; background: var(--gradient-primary); border-radius: 10px; }

    .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
    .episode-item { background: var(--bg-elevated); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.4s; }
    .episode-item:hover { transform: translateY(-8px); outline: 1px solid var(--primary); }
    .episode-item img { width: 100%; height: 180px; object-fit: cover; }
    .episode-info { padding: 20px; }

    .rec-list { display: flex; overflow-x: auto; gap: 24px; padding-bottom: 20px; scrollbar-width: none; }
    .rec-item { width: 200px; flex: 0 0 auto; cursor: pointer; transition: 0.3s; }
    .rec-item img { width: 100%; border-radius: 12px; height: 300px; object-fit: cover; }
    
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    .hidden { display: none; }

    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      header {
        padding: 20px 20px;
        flex-direction: column;
        gap: 15px;
        align-items: stretch;
      }

      header h1 {
        font-size: 32px;
        letter-spacing: 2px;
        text-align: center;
      }

      .header-right {
        flex-direction: column;
        gap: 15px;
      }

      .search-wrapper {
        max-width: 100%;
      }

      #searchBar {
        width: 100%;
      }

      #searchResults {
        top: auto;
        right: 20px;
        left: 20px;
        width: auto;
      }

      .content {
        padding: 20px 20px 60px;
      }

      h1#showTitle {
        font-size: 32px;
        margin-bottom: 20px;
      }

      #videoPlayer {
        height: 50vh;
        border-radius: 12px;
      }

      .player-controls {
        flex-direction: column;
        gap: 10px;
      }

      .control-btn {
        width: 100%;
        padding: 12px 20px;
      }

      .controls {
        margin: 30px 0;
      }

      select {
        width: 100%;
        padding: 12px 20px;
      }

      .section-title {
        font-size: 24px;
        padding: 15px 0;
      }

      .section-title::before {
        height: 22px;
      }

      .episode-list {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .episode-item img {
        height: 200px;
      }

      .rec-list {
        gap: 15px;
      }

      .rec-item {
        width: 160px;
      }

      .rec-item img {
        height: 240px;
      }

      #watchlistBtn {
        width: 100%;
        padding: 12px 20px !important;
        font-size: 14px !important;
      }
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 28px;
      }

      h1#showTitle {
        font-size: 26px;
      }

      #videoPlayer {
        height: 40vh;
      }

      .control-btn {
        padding: 10px 16px;
        font-size: 14px;
      }

      .section-title {
        font-size: 20px;
      }

      .episode-item img {
        height: 180px;
      }

      .episode-info h3 {
        font-size: 14px;
      }

      .rec-item {
        width: 140px;
      }

      .rec-item img {
        height: 210px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1 onclick="window.location.href='index.html'">NIXFLIX</h1>
  <div class="header-right">
    <button id="watchlistBtn" class="control-btn" onclick="toggleWatchlist()" style="padding: 10px 20px; font-size: 13px;">+ Add to My List</button>
    <div class="search-wrapper">
      <input type="text" id="searchBar" placeholder="Search series..." onkeyup="handleSearch(event)">
    </div>
  </div>
</header>

<div id="searchResults"></div>

<div class="content">
  <h1 id="showTitle">Loading...</h1>

  <div class="video-container">
    <iframe id="videoPlayer" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>

  <div class="player-controls">
    <button class="control-btn" id="prevBtn" onclick="changeEpisode(-1)" disabled>← Prev</button>
    <div style="display:flex; align-items:center; background:rgba(255,255,255,0.05); padding:8px 20px; border-radius:30px; gap:10px;">
        <span style="font-size: 12px; font-weight: 700;">AUTO NEXT</span>
        <label class="switch">
            <input type="checkbox" id="autoNextToggle" checked>
            <span class="slider"></span>
        </label>
    </div>
    <button class="control-btn btn-primary" id="nextBtn" onclick="changeEpisode(1)" disabled>Next Episode →</button>
  </div>
 
  <div class="controls">
    <label for="seasonSelect">Choose a Season</label>
    <select id="seasonSelect" onchange="loadEpisodes()"></select>
  </div>

  <h3 class="section-title">Episodes</h3>
  <div class="episode-list" id="episodeList"></div>

  <div class="recommendations">
    <h2 class="section-title">More Like This</h2>
    <div class="rec-list" id="recList"></div>
  </div>
</div>

<script>
const apiKey = '93843c8c295f5655a75d6361487e911a';
const params = new URLSearchParams(window.location.search);
const showId = params.get('id');
const showName = params.get('name');
let currentEpisodeIndex = -1;
let currentEpisodeList = [];
let currentShowData = null; // Store for Watchlist logic

document.getElementById('showTitle').textContent = decodeURIComponent(showName || 'Series');

function handleSearch(event) {
  const q = event.target.value.trim();
  const resDiv = document.getElementById('searchResults');
  resDiv.innerHTML = '';
  if (q.length < 2) return;
  fetch(`https://api.themoviedb.org/3/search/tv?api_key=${apiKey}&query=${encodeURIComponent(q)}`)
    .then(r => r.json()).then(data => {
      data.results.slice(0, 5).forEach(s => {
        const div = document.createElement('div');
        div.className = 'search-result';
        div.innerHTML = `<img src="https://image.tmdb.org/t/p/w200${s.poster_path}"><div>${s.name}</div>`;
        div.onclick = () => window.location.href = `show.html?id=${s.id}&name=${encodeURIComponent(s.name)}`;
        resDiv.appendChild(div);
      });
    });
}

async function loadSeasons() {
  const res = await fetch(`https://api.themoviedb.org/3/tv/${showId}?api_key=${apiKey}`);
  const data = await res.json();
  currentShowData = data; // Save data for watchlist
  updateWatchlistBtnUI();

  const select = document.getElementById('seasonSelect');
  data.seasons.forEach(s => {
    if (s.season_number === 0) return;
    const opt = document.createElement('option');
    opt.value = s.season_number;
    opt.textContent = `Season ${s.season_number}`;
    select.appendChild(opt);
  });
  loadEpisodes();
  loadRecommendations();
}

function loadEpisodes() {
  const season = document.getElementById('seasonSelect').value;
  fetch(`https://api.themoviedb.org/3/tv/${showId}/season/${season}?api_key=${apiKey}`)
    .then(r => r.json()).then(data => {
      currentEpisodeList = data.episodes;
      const list = document.getElementById('episodeList');
      list.innerHTML = '';
      data.episodes.forEach((ep, idx) => {
        const div = document.createElement('div');
        div.className = 'episode-item';
        div.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${ep.still_path}"><div class="episode-info"><h3>Ep ${ep.episode_number}: ${ep.name}</h3></div>`;
        div.onclick = () => { currentEpisodeIndex = idx; playEpisode(ep.episode_number, season); };
        list.appendChild(div);
      });
    });
}

function playEpisode(num, s) {
  const isAuto = document.getElementById('autoNextToggle').checked;
  document.getElementById('videoPlayer').src = `https://vidfast.pro/tv/${showId}/${s}/${num}?autoPlay=true&nextButton=true${isAuto ? '&autoNext=true' : ''}&theme=FF0033`;
  updateBtns();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function changeEpisode(dir) {
  const next = currentEpisodeIndex + dir;
  if (currentEpisodeList[next]) {
    currentEpisodeIndex = next;
    playEpisode(currentEpisodeList[next].episode_number, document.getElementById('seasonSelect').value);
  }
}

function updateBtns() {
  document.getElementById('prevBtn').disabled = (currentEpisodeIndex <= 0);
  document.getElementById('nextBtn').disabled = (currentEpisodeIndex >= currentEpisodeList.length - 1);
}

function loadRecommendations() {
  fetch(`https://api.themoviedb.org/3/tv/${showId}/recommendations?api_key=${apiKey}`)
    .then(r => r.json()).then(data => {
      const recs = document.getElementById('recList');
      data.results.forEach(r => {
        const div = document.createElement('div');
        div.className = 'rec-item';
        div.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${r.poster_path}">`;
        div.onclick = () => window.location.href = `show.html?id=${r.id}&name=${encodeURIComponent(r.name)}`;
        recs.appendChild(div);
      });
    });
}

// WATCHLIST LOGIC
function toggleWatchlist() {
    let list = JSON.parse(localStorage.getItem('nixflix_watchlist')) || [];
    const index = list.findIndex(item => item.id == currentShowData.id);

    if (index > -1) {
        list.splice(index, 1);
    } else {
        list.push({
            id: currentShowData.id,
            poster_path: currentShowData.poster_path,
            name: currentShowData.name,
            media_type: 'tv' 
        });
    }

    localStorage.setItem('nixflix_watchlist', JSON.stringify(list));
    updateWatchlistBtnUI();
}

function updateWatchlistBtnUI() {
    const list = JSON.parse(localStorage.getItem('nixflix_watchlist')) || [];
    const btn = document.getElementById('watchlistBtn');
    if (!currentShowData) return;
    const isAdded = list.some(item => item.id == currentShowData.id);
    
    btn.innerHTML = isAdded ? '✓ In My List' : '+ Add to My List';
    btn.style.background = isAdded ? 'var(--primary)' : 'rgba(255,255,255,0.05)';
}

loadSeasons();
</script>
</body>
</html>
