<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Series — NixFlix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF0033;
      --bg-dark: #0A0A0A;
      --bg-elevated: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #B8B8B8;
      --accent-gold: #FFD700;
      --gradient-primary: linear-gradient(135deg, #FF0033 0%, #CC0066 100%);
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255, 0, 51, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(204, 0, 102, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: slideDown 0.6s ease-out;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: 1; transform: translateY(0); }
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 4px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    header h1:hover {
      letter-spacing: 7px;
      filter: drop-shadow(0 0 20px rgba(255, 0, 51, 0.5));
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 400px;
    }
    
    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 16px;
      pointer-events: none;
    }

    #searchBar {
      width: 100%;
      padding: 12px 20px 12px 50px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    #searchResults {
      position: absolute;
      top: 80px;
      right: 60px;
      width: 400px;
      background: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      z-index: 1000;
      max-height: 500px;
      overflow-y: auto;
    }

    .search-result {
      display: flex;
      align-items: center;
      padding: 15px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-result img {
      width: 50px;
      height: 75px;
      object-fit: cover;
      border-radius: 6px;
      margin-right: 15px;
    }

    .content {
      padding: 40px 60px 80px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 30px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .video-container {
      position: relative;
      margin-bottom: 10px;
      animation: fadeIn 0.8s ease-out 0.2s backwards;
    }

    #videoPlayer {
      width: 100%;
      height: 80vh;
      background: #000;
      border: none;
      border-radius: 16px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
    }

    /* PLAYER CONTROLS BOX */
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .control-btn {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .control-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--gradient-primary);
      border: none;
      box-shadow: 0 10px 20px rgba(255, 0, 51, 0.2);
    }

    .btn-primary:hover {
      box-shadow: 0 15px 30px rgba(255, 0, 51, 0.4);
    }

    .auto-next-wrapper {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 8px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        gap: 10px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    .controls {
      margin: 40px 0;
    }

    label {
      display: block;
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }

    select {
      padding: 14px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: var(--text-primary);
      cursor: pointer;
      min-width: 200px;
    }

    .episode-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      margin-top: 20px;
    }

    .episode-item {
      background: var(--bg-elevated);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .episode-item:hover {
      transform: translateY(-8px);
      border: 1px solid var(--primary);
    }

    .episode-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .episode-info { padding: 20px; }

    .recommendations { margin-top: 60px; }

    .rec-list {
      display: flex;
      overflow-x: auto;
      gap: 24px;
      padding-bottom: 20px;
    }

    .rec-item { width: 200px; flex: 0 0 auto; cursor: pointer; transition: 0.3s; }
    .rec-item img { width: 100%; border-radius: 12px; height: 300px; object-fit: cover; }
    .rec-item:hover { transform: scale(1.05); }

    @media (max-width: 768px) {
      header { padding: 20px 30px; }
      .content { padding: 30px; }
      #videoPlayer { height: 40vh; }
    }
  </style>
</head>
<body>

<header>
  <h1 onclick="goHome()">NIXFLIX</h1>
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchBar" placeholder="Search series..." onkeyup="handleSearch(event)">
  </div>
</header>

<div id="searchResults"></div>

<div class="content">
  <h1 id="showTitle">Loading...</h1>

  <div class="video-container">
    <iframe id="videoPlayer" frameborder="0"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen referrerpolicy="no-referrer"></iframe>
  </div>

  <div class="player-controls">
    <button class="control-btn" id="prevBtn" onclick="changeEpisode(-1)" disabled>← Prev</button>
    
    <div class="auto-next-wrapper">
        <span style="font-size: 13px; font-weight: 500;">AUTO NEXT</span>
        <label class="switch">
            <input type="checkbox" id="autoNextToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <button class="control-btn btn-primary" id="nextBtn" onclick="changeEpisode(1)" disabled>Next Episode →</button>
  </div>

  <div class="controls">
    <label for="seasonSelect">Choose a Season</label>
    <select id="seasonSelect" onchange="loadEpisodes()"></select>
  </div>

  <h3 class="section-title">Episodes</h3>
  <div class="episode-list" id="episodeList"></div>

  <div class="recommendations">
    <h2>More Like This</h2>
    <div class="rec-list" id="recList"></div>
  </div>
</div>

<script>
const apiKey = '93843c8c295f5655a75d6361487e911a';
const urlParams = new URLSearchParams(window.location.search);
const showId = urlParams.get('id');
const showName = urlParams.get('name');
let selectedSeason = 1;
let currentEpisodeIndex = -1;
let currentEpisodeList = [];

document.getElementById('showTitle').textContent = decodeURIComponent(showName || 'Series');

function goHome() { window.location.href = 'index.html'; }

// Vidfast API Listener for Auto-Next (optional)
window.addEventListener("message", function(event) {
    if (event.origin.includes("vidfast.pro")) {
        try {
            const data = JSON.parse(event.data);
            if (data.event === "onVideoEnd") {
                const isAutoNext = document.getElementById('autoNextToggle').checked;
                if (isAutoNext) {
                    changeEpisode(1);
                }
            }
        } catch (e) {}
    }
});

function handleSearch(event) {
  const query = event.target.value.trim();
  const resultsDiv = document.getElementById('searchResults');
  resultsDiv.innerHTML = '';
  if (query.length < 2) return;

  fetch(`https://api.themoviedb.org/3/search/tv?api_key=${apiKey}&query=${encodeURIComponent(query)}`)
    .then(res => res.json())
    .then(data => {
      data.results.slice(0, 6).forEach(show => {
        const div = document.createElement('div');
        div.className = 'search-result';
        const img = show.poster_path ? `https://image.tmdb.org/t/p/w200${show.poster_path}` : 'https://via.placeholder.com/80x120?text=No+Image';
        div.innerHTML = `<img src="${img}" alt=""><div>${show.name}</div>`;
        div.onclick = () => { window.location.href = `show.html?id=${show.id}&name=${encodeURIComponent(show.name)}`; };
        resultsDiv.appendChild(div);
      });
    });
}

function loadSeasons() {
  fetch(`https://api.themoviedb.org/3/tv/${showId}?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
      const seasonSelect = document.getElementById('seasonSelect');
      seasonSelect.innerHTML = '';
      data.seasons.forEach(season => {
        if (season.season_number === 0) return;
        const option = document.createElement('option');
        option.value = season.season_number;
        option.textContent = `Season ${season.season_number}`;
        seasonSelect.appendChild(option);
      });
      selectedSeason = seasonSelect.value;
      loadEpisodes();
      loadRecommendations();
    });
}

function loadEpisodes() {
  const season = document.getElementById('seasonSelect').value;
  fetch(`https://api.themoviedb.org/3/tv/${showId}/season/${season}?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
      currentEpisodeList = data.episodes;
      const episodeList = document.getElementById('episodeList');
      episodeList.innerHTML = '';
      data.episodes.forEach((episode, index) => {
        const still = episode.still_path ? `https://image.tmdb.org/t/p/w500${episode.still_path}` : 'https://via.placeholder.com/500x281?text=No+Image';
        const div = document.createElement('div');
        div.className = 'episode-item';
        div.innerHTML = `
          <img src="${still}" alt="Episode ${episode.episode_number}">
          <div class="episode-info">
            <h3>Episode ${episode.episode_number}: ${episode.name}</h3>
            <p>${episode.overview || 'No description available.'}</p>
          </div>
        `;
        div.onclick = () => {
          currentEpisodeIndex = index;
          playEpisode(episode.episode_number, season);
        };
        episodeList.appendChild(div);
      });
    });
}

// ==========================
// 🔥 UPDATED PLAYER FUNCTION
// ==========================
function playEpisode(episodeNumber, season) {
  const iframe = document.getElementById('videoPlayer');
  const isAutoNext = document.getElementById('autoNextToggle').checked;

  iframe.src =
    `https://vidfast.pro/tv/${showId}/${season}/${episodeNumber}` +
    `?autoPlay=true&nextButton=true` +
    `${isAutoNext ? '&autoNext=true' : ''}` +
    `&theme=FF0033`;

  iframe.scrollIntoView({ behavior: 'smooth' });
  updateControlButtons();
}

function changeEpisode(direction) {
    const nextIndex = currentEpisodeIndex + direction;
    if (currentEpisodeList[nextIndex]) {
        currentEpisodeIndex = nextIndex;
        playEpisode(currentEpisodeList[nextIndex].episode_number, document.getElementById('seasonSelect').value);
    }
}

function updateControlButtons() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    prevBtn.disabled = (currentEpisodeIndex <= 0);
    nextBtn.disabled = (currentEpisodeIndex >= currentEpisodeList.length - 1);
    
    prevBtn.style.display = 'flex';
    nextBtn.style.display = 'flex';
}

function loadRecommendations() {
  fetch(`https://api.themoviedb.org/3/tv/${showId}/recommendations?api_key=${apiKey}`)
    .then(res => res.json())
    .then(data => {
      const recList = document.getElementById('recList');
      recList.innerHTML = '';
      data.results.forEach(rec => {
        const poster = rec.poster_path ? `https://image.tmdb.org/t/p/w500${rec.poster_path}` : 'https://via.placeholder.com/200x300?text=No+Image';
        const div = document.createElement('div');
        div.className = 'rec-item';
        div.innerHTML = `<img src="${poster}" alt="${rec.name}"><div class="rec-title">${rec.name}</div>`;
        div.onclick = () => { window.location.href = `show.html?id=${rec.id}&name=${encodeURIComponent(rec.name)}`; };
        recList.appendChild(div);
      });
    });
}

loadSeasons();
</script>

</body>
</html>
